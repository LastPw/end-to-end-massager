name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Build server
        working-directory: server
        run: npm run build
      - name: Test server
        working-directory: server
        run: npm test
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Build client
        working-directory: client
        run: npm run build
      - name: Test client
        working-directory: client
        run: npm test
