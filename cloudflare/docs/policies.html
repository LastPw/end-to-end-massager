<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Policies - Smart Security Gateway</title>
    <style>
      :root {
        --bg: #f2efe9;
        --ink: #1c1c1c;
        --accent: #e07a5f;
        --card: #ffffff;
        --muted: #6b6b6b;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #f2efe9 0%, #f7f1e1 45%, #e9ecef 100%);
      }
      header {
        padding: 32px 24px 16px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
      }
      .container {
        max-width: 920px;
        margin: 0 auto;
        padding: 0 24px 40px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 18px 20px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
      }
      .muted {
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      .title {
        font-weight: 600;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Policies</h1>
      <div class="muted">Free tier terms, privacy, and fair use</div>
    </header>
    <div class="container">
      <div class="card">
        <div class="title">Fair Use Policy</div>
        <div class="muted">
          Limits and acceptable use for the free service.
        </div>
        <div><a href="../FAIR_USE.en.md">Read Fair Use</a></div>
      </div>
      <div class="card">
        <div class="title">Privacy Policy</div>
        <div class="muted">
          What data is collected and how it is used.
        </div>
        <div><a href="../PRIVACY.en.md">Read Privacy</a></div>
      </div>
      <div class="card">
        <div class="title">Terms of Service</div>
        <div class="muted">Responsibilities and liability terms.</div>
        <div><a href="../TERMS.en.md">Read Terms</a></div>
      </div>
    </div>
  </body>
</html>
