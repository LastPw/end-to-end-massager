<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geo & Reputation</title>
    <style>
      :root {
        --bg: #f2efe9;
        --ink: #1c1c1c;
        --accent: #81b29a;
        --card: #ffffff;
        --muted: #6b6b6b;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #f2efe9 0%, #f7f1e1 45%, #e9ecef 100%);
      }
      header {
        padding: 32px 24px 16px;
      }
      h1 {
        margin: 0;
        font-size: 26px;
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 0 24px 40px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      input,
      select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #eee;
        font-size: 13px;
      }
      .muted {
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Geo & IP Reputation</h1>
      <div class="muted">
        Country rules and IP scoring · <a href="/admin">Dashboard</a>
      </div>
    </header>
    <div class="container">
      <div class="card">
        <h3>Geo Policy</h3>
        <div class="row">
          <input id="country" placeholder="Country code (US)" />
          <select id="geoAction">
            <option value="allow">allow</option>
            <option value="challenge">challenge</option>
            <option value="block">block</option>
          </select>
          <button onclick="upsertGeo()">Save</button>
        </div>
        <div class="muted" id="geoStatus"></div>
        <table>
          <thead>
            <tr>
              <th>Country</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="geoRows"></tbody>
        </table>
      </div>

      <div class="card">
        <h3>IP Reputation</h3>
        <div class="row">
          <input id="ip" placeholder="IP address" />
          <input id="score" type="number" placeholder="Score (-100..100)" />
          <input id="note" placeholder="Note" />
          <button onclick="upsertIp()">Save</button>
        </div>
        <div class="muted" id="ipStatus"></div>
        <table>
          <thead>
            <tr>
              <th>IP</th>
              <th>Score</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="ipRows"></tbody>
        </table>
      </div>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function loadGeo() {
        const res = await fetch("/api/geo");
        const data = await res.json();
        const rows = (data.items || [])
          .map(
            (item) => `
          <tr>
            <td>${escapeHtml(item.country)}</td>
            <td>${escapeHtml(item.action)}</td>
          </tr>
        `
          )
          .join("");
        document.getElementById("geoRows").innerHTML = rows;
      }

      async function loadIp() {
        const res = await fetch("/api/ip-rep");
        const data = await res.json();
        const rows = (data.items || [])
          .map(
            (item) => `
          <tr>
            <td>${escapeHtml(item.ip)}</td>
            <td>${escapeHtml(item.score)}</td>
            <td>${escapeHtml(item.note)}</td>
          </tr>
        `
          )
          .join("");
        document.getElementById("ipRows").innerHTML = rows;
      }

      async function upsertGeo() {
        const country = document.getElementById("country").value.trim();
        const action = document.getElementById("geoAction").value;
        const res = await fetch("/api/geo/upsert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ country, action }),
        });
        const data = await res.json();
        document.getElementById("geoStatus").textContent =
          data.status === "ok" ? "Saved." : "Error: " + data.message;
        await loadGeo();
      }

      async function upsertIp() {
        const ip = document.getElementById("ip").value.trim();
        const score = parseInt(document.getElementById("score").value, 10);
        const note = document.getElementById("note").value.trim();
        const res = await fetch("/api/ip-rep/upsert", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ip, score, note }),
        });
        const data = await res.json();
        document.getElementById("ipStatus").textContent =
          data.status === "ok" ? "Saved." : "Error: " + data.message;
        await loadIp();
      }

      loadGeo();
      loadIp();
    </script>
  </body>
</html>
