<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Management</title>
    <style>
      :root {
        --bg: #f2efe9;
        --ink: #1c1c1c;
        --accent: #e07a5f;
        --card: #ffffff;
        --muted: #6b6b6b;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #f2efe9 0%, #f7f1e1 45%, #e9ecef 100%);
      }
      header {
        padding: 32px 24px 16px;
      }
      h1 {
        margin: 0;
        font-size: 26px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px 40px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        min-width: 220px;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
      }
      .muted {
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      code {
        background: #f7f1e1;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Domain Management</h1>
      <div class="muted">Verify ownership via DNS TXT record</div>
    </header>
    <div class="container">
      <div class="card">
        <div class="row">
          <input id="domainInput" placeholder="example.com" />
          <button onclick="registerDomain()">Register Domain</button>
          <a href="/admin">Back to Dashboard</a>
        </div>
        <div class="muted" id="registerStatus"></div>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Domain</th>
              <th>Token</th>
              <th>Verified</th>
              <th>Origin OK</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="domainRows"></tbody>
        </table>
      </div>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function fetchDomains() {
        const res = await fetch("/api/domains");
        return res.json();
      }

      async function registerDomain() {
        const domain = document.getElementById("domainInput").value.trim();
        const res = await fetch("/api/domains/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ domain }),
        });
        const data = await res.json();
        const status = document.getElementById("registerStatus");
        if (data.status === "ok") {
          status.textContent =
            "Add TXT record: " + "sgw-verify=" + data.token;
        } else {
          status.textContent = "Error: " + data.message;
        }
        await loadDomains();
      }

      async function verifyDomain(domain, token) {
        const res = await fetch("/api/domains/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ domain, token }),
        });
        await res.json();
        await loadDomains();
      }

      async function loadDomains() {
        const data = await fetchDomains();
        const rows = data.items
          .map(
            (item) => `
          <tr>
            <td>${escapeHtml(item.domain)}</td>
            <td><code>${escapeHtml(`sgw-verify=${item.token}`)}</code></td>
            <td>${escapeHtml(item.verified ? "yes" : "no")}</td>
            <td>${escapeHtml(item.origin_ok ? "yes" : "no")}</td>
            <td>
              <button onclick='verifyDomain(${JSON.stringify(item.domain)}, ${JSON.stringify(item.token)})'>
                Verify
              </button>
            </td>
          </tr>
        `
          )
          .join("");
        document.getElementById("domainRows").innerHTML = rows;
      }

      loadDomains();
    </script>
  </body>
</html>
