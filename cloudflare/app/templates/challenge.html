<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifying...</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: #f7f1e1;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .box {
        background: #fff;
        padding: 24px 32px;
        border-radius: 16px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
      }
      .muted {
        color: #6b6b6b;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div>Verifying your session...</div>
      <div class="muted">Please wait a moment</div>
    </div>
    <script>
      async function verify() {
        const res = await fetch("/api/challenge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ts: {{ ts }}, token: "{{ token }}" }),
        });
        const data = await res.json();
        if (data.status === "pass") {
          location.href = "/";
        } else {
          document.body.innerHTML = "<div class='box'>Verification failed.</div>";
        }
      }

      setTimeout(verify, Math.floor(300 + Math.random() * 600));
    </script>
  </body>
</html>
