<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Gateway Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #f2efe9;
        --ink: #1c1c1c;
        --accent: #e07a5f;
        --card: #ffffff;
        --muted: #6b6b6b;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #f2efe9 0%, #f7f1e1 45%, #e9ecef 100%);
      }

      header {
        padding: 32px 24px 16px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      .grid {
        display: grid;
        gap: 16px;
        padding: 0 24px 32px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      }

      .metric {
        font-size: 24px;
        font-weight: 600;
      }

      .muted {
        color: var(--muted);
      }

      .chart-wrap {
        padding: 0 24px 40px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Security Gateway Dashboard</h1>
      <div class="muted">
        Behavior-driven reverse proxy insights ·
        <a href="/admin/domains">Domains</a> ·
        <a href="/admin/waf">WAF</a> ·
        <a href="/admin/bot">Bot</a> ·
        <a href="/admin/geo">Geo/IP</a> ·
        <a href="/admin/reports">Reports</a> ·
        <a href="/admin/experiments">Experiment Report</a>
      </div>
    </header>

    <section class="grid" id="metrics"></section>

    <section class="chart-wrap">
      <div class="card">
        <canvas id="trafficChart" height="120"></canvas>
      </div>
    </section>

    <section class="chart-wrap">
      <div class="card">
        <canvas id="actionChart" height="140"></canvas>
      </div>
    </section>

    <script>
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function fetchStats() {
        const res = await fetch("/api/stats");
        return res.json();
      }

      function renderMetrics(snapshot) {
        const metrics = [
          { label: "Total Decisions", value: snapshot.total },
          { label: "Allow", value: snapshot.allow },
          { label: "Challenge", value: snapshot.challenge },
          { label: "Block", value: snapshot.block },
          { label: "Avg Risk", value: snapshot.avg_risk.toFixed(2) },
        ];
        const container = document.getElementById("metrics");
        container.innerHTML = metrics
          .map(
            (item) => `
          <div class="card">
            <div class="muted">${escapeHtml(item.label)}</div>
            <div class="metric">${escapeHtml(item.value)}</div>
          </div>
        `
          )
          .join("");
      }

      let trafficChart = null;
      let actionChart = null;

      function renderChart(series) {
        const ctx = document.getElementById("trafficChart");
        const labels = series.map((point) => new Date(point.ts * 1000).toLocaleTimeString());
        const data = series.map((point) => point.count);
        if (trafficChart) {
          trafficChart.data.labels = labels;
          trafficChart.data.datasets[0].data = data;
          trafficChart.update();
          return;
        }
        trafficChart = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "Requests / min",
                data,
                borderColor: "#e07a5f",
                backgroundColor: "rgba(224, 122, 95, 0.2)",
                fill: true,
                tension: 0.3,
              },
            ],
          },
          options: {
            plugins: {
              legend: { display: false },
            },
            scales: {
              y: { beginAtZero: true },
            },
          },
        });
      }

      function renderActions(series) {
        const ctx = document.getElementById("actionChart");
        const labels = series.map((point) => new Date(point.ts * 1000).toLocaleTimeString());
        const allow = series.map((point) => point.allow);
        const challenge = series.map((point) => point.challenge);
        const block = series.map((point) => point.block);
        if (actionChart) {
          actionChart.data.labels = labels;
          actionChart.data.datasets[0].data = allow;
          actionChart.data.datasets[1].data = challenge;
          actionChart.data.datasets[2].data = block;
          actionChart.update();
          return;
        }
        actionChart = new Chart(ctx, {
          type: "bar",
          data: {
            labels,
            datasets: [
              { label: "Allow", data: allow, backgroundColor: "#81b29a" },
              { label: "Challenge", data: challenge, backgroundColor: "#f2cc8f" },
              { label: "Block", data: block, backgroundColor: "#e07a5f" },
            ],
          },
          options: {
            responsive: true,
            scales: {
              x: { stacked: true },
              y: { stacked: true, beginAtZero: true },
            },
          },
        });
      }

      async function init() {
        const stats = await fetchStats();
        renderMetrics(stats.snapshot);
        renderChart(stats.series);
        renderActions(stats.actions);
      }

      init();
      setInterval(init, 5000);
    </script>
  </body>
</html>
