<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAF Rules</title>
    <style>
      :root {
        --bg: #f2efe9;
        --ink: #1c1c1c;
        --accent: #e07a5f;
        --card: #ffffff;
        --muted: #6b6b6b;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #f2efe9 0%, #f7f1e1 45%, #e9ecef 100%);
      }
      header {
        padding: 32px 24px 16px;
      }
      h1 {
        margin: 0;
        font-size: 26px;
      }
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 24px 40px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #eee;
        font-size: 13px;
      }
      .muted {
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      code {
        background: #f7f1e1;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>WAF Rules</h1>
      <div class="muted">
        Manage regex-based WAF rules · <a href="/admin">Dashboard</a>
      </div>
    </header>
    <div class="container">
      <div class="card">
        <div class="row">
          <input id="pattern" placeholder="Regex pattern" style="min-width: 320px" />
          <input id="desc" placeholder="Description" style="min-width: 220px" />
          <button onclick="addRule()">Add Rule</button>
        </div>
        <div class="muted" id="status"></div>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Pattern</th>
              <th>Description</th>
              <th>Enabled</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>

    <script>
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function fetchRules() {
        const res = await fetch("/api/waf");
        return res.json();
      }

      async function addRule() {
        const pattern = document.getElementById("pattern").value.trim();
        const description = document.getElementById("desc").value.trim();
        const res = await fetch("/api/waf/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pattern, description, enabled: true }),
        });
        const data = await res.json();
        document.getElementById("status").textContent =
          data.status === "ok" ? "Rule added." : "Error: " + data.message;
        await load();
      }

      async function toggleRule(id, enabled) {
        await fetch("/api/waf/toggle", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, enabled }),
        });
        await load();
      }

      async function deleteRule(id) {
        await fetch("/api/waf/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id }),
        });
        await load();
      }

      async function load() {
        const data = await fetchRules();
        const rows = data.items
          .map(
            (item) => `
          <tr>
            <td>${escapeHtml(item.id)}</td>
            <td><code>${escapeHtml(item.pattern)}</code></td>
            <td>${escapeHtml(item.description)}</td>
            <td>${escapeHtml(item.enabled ? "yes" : "no")}</td>
            <td>
              <button onclick="toggleRule(${item.id}, ${!item.enabled})">
                ${item.enabled ? "Disable" : "Enable"}
              </button>
              <button onclick="deleteRule(${item.id})">Delete</button>
            </td>
          </tr>
        `
          )
          .join("");
        document.getElementById("rows").innerHTML = rows;
      }

      load();
    </script>
  </body>
</html>
